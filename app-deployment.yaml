apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hospital
    spec:
      containers:
        - name: hospital-cont
          image: nimeshsv814/hospital-app:latest
          ports:
            - containerPort: 5000
          # env:
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: hospital-svc
spec:
  selector:
    app: hospital
  ports:
    - port: 5000
      targetPort: 5000
  type: NodePort
